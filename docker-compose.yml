services:
  kolflow:
    image: ghcr.io/panda-995/kolflow:latest
    container_name: kolflow
    ports:
      - "3000:3000"
    volumes:
      - kolflow-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      # ===== 安全配置（生产环境必须设置） =====
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET必须配置}
      - INVITE_CODE=${INVITE_CODE:-panda995}
      # 默认允许 HTTP/HTTPS 域名、局域网和 App 访问；需要收紧时可改为逗号分隔域名列表
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # 默认保留 HTTP；如已配置 HTTPS 反向代理，可设为 true 强制 HTTPS
      - ENFORCE_HTTPS=${ENFORCE_HTTPS:-false}
      # 仅当容器前一跳是受控反向代理时设为 1，用于读取 X-Forwarded-Proto
      - TRUST_PROXY=${TRUST_PROXY:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kolflow-data:
    driver: local
