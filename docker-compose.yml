version: '3.8'

services:
  kolflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: kolflow:latest
    container_name: kolflow
    ports:
      - "3000:3000"
    volumes:
      - kolflow-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      # ===== 安全配置（生产环境必须设置） =====
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET必须配置}
      - INVITE_CODE=${INVITE_CODE:-panda995}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kolflow-data:
    driver: local