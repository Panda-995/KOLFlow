services:
  kolflow:
    image: ghcr.io/panda-995/kolflow:1.3.0
    container_name: kolflow
    ports:
      - "3441:3000"
    volumes:
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      JWT_SECRET: ${JWT_SECRET}
      INVITE_CODE: ${INVITE_CODE}
      CORS_ORIGIN: "*"
    restart: always
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
