spec_version: "2.1"
app_id: com.panda.kolflow
version: 1.3.0
support_arch:
  - amd64
  - arm64
supports:
  - app
  - pc
is_docker_app: true
only_admin: true
port: 3441
open_type: tab
tag_types:
  - utility
depend_fw_version: 1.13.0.0000
depend_docker_version: 1.7.0.0000
license_agreement_link:
  - https://github.com/Panda-995/KOLFlow/blob/main/LICENSE
source_code_link:
  - https://github.com/Panda-995/KOLFlow
privacy_policy_link:
  - https://github.com/Panda-995/KOLFlow/blob/main/public/privacy-policy.html
parameters:
  - key: JWT_SECRET
    type: password
    required: true
    changeable: true
    min_length: 32
    max_length: 128
    i18n:
      en-US:
        name: JWT signing secret
        description: Enter a random secret of 32 to 128 characters for signing login tokens. Keep it safe and unchanged after installation.
      zh-CN:
        name: JWT 签名密钥
        description: 请输入 32 至 128 位随机字符，用于签发登录令牌。安装后请妥善保管，不要随意修改。
  - key: INVITE_CODE
    type: password
    required: true
    changeable: true
    min_length: 6
    max_length: 64
    i18n:
      en-US:
        name: Registration invite code
        description: Enter a 6 to 64 character invite code. New users must provide this code when registering.
      zh-CN:
        name: 注册邀请码
        description: 请输入 6 至 64 位邀请码，新用户注册 KOLFlow 账号时必须填写此邀请码。
i18n:
  en-US:
    name: KOLFlow
    description: KOLFlow is a self-hosted business collaboration manager designed for creators and KOLs. This update retains full HTTP access and login while encrypting login, registration, account-security, and account-deletion payloads with RSA-OAEP-256 and AES-256-GCM so email addresses, passwords, and invite codes no longer appear directly in HTTP request bodies. Licensed under GNU AGPL v3.0.
    author: 熊猫不是猫QAQ
    official: https://github.com/Panda-995/KOLFlow
    help: https://post.smzdm.com/p/a6zg63m0/
    publisher: 熊猫不是猫QAQ
    publisher_link: https://github.com/Panda-995
  zh-CN:
    name: KOLFlow
    description: KOLFlow 是面向 KOL、内容创作者与达人团队的自托管商单管理系统。当前版本保留完整 HTTP 访问与登录功能，并对登录、注册、修改邮箱/密码和账号注销载荷执行 RSA-OAEP-256 与 AES-256-GCM 混合加密，避免邮箱、密码和邀请码直接出现在 HTTP 请求体中。项目采用 GNU AGPL v3.0 开源。
    author: 熊猫不是猫QAQ
    official: https://github.com/Panda-995/KOLFlow
    help: https://post.smzdm.com/p/a6zg63m0/
    publisher: 熊猫不是猫QAQ
    publisher_link: https://github.com/Panda-995
