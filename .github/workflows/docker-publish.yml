name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/panda-995/kolflow
  DOCKERHUB_IMAGE: panda995/kolflow
  HAS_DOCKERHUB: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_TOKEN != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker Hub image
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest (GHCR)
        run: |
          docker buildx imagetools create \
            -t ${{ env.GHCR_IMAGE }}:latest \
            ${{ env.GHCR_IMAGE }}:amd64 \
            ${{ env.GHCR_IMAGE }}:arm64

      - name: Verify published image (GHCR)
        run: docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:latest

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Create and push multi-arch manifest (Docker Hub)
        if: env.HAS_DOCKERHUB == 'true'
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKERHUB_IMAGE }}:latest \
            ${{ env.DOCKERHUB_IMAGE }}:amd64 \
            ${{ env.DOCKERHUB_IMAGE }}:arm64

      - name: Verify published image (Docker Hub)
        if: env.HAS_DOCKERHUB == 'true'
        run: docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:latest

  cleanup:
    needs: [merge-manifest]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old GHCR package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGE_NAME="kolflow"
          KEEP_TAGS="latest amd64 arm64"
          API_BASE="/users/${OWNER}/packages/container/${PACKAGE_NAME}"

          gh api -H "Accept: application/vnd.github+json" \
            "${API_BASE}/versions" \
            --paginate --jq '.[] | {id: .id, tags: [.metadata.container.tags[]]}' |
          jq -c '.' | while read -r version; do
            ID=$(echo "$version" | jq -r '.id')
            TAGS=$(echo "$version" | jq -r '.tags[]?')

            SHOULD_KEEP=false
            for keep_tag in $KEEP_TAGS; do
              if echo "$TAGS" | grep -q "^${keep_tag}$"; then
                SHOULD_KEEP=true
                break
              fi
            done

            if [ "$SHOULD_KEEP" = false ]; then
              echo "Deleting old version: $ID"
              gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "${API_BASE}/versions/${ID}" || true
            fi
          done

      - name: Delete old Docker Hub tags
        if: env.HAS_DOCKERHUB == 'true'
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          set -euo pipefail

          KEEP_TAGS="latest amd64 arm64"
          AUTH_PAYLOAD=$(jq -n \
            --arg identifier "$DOCKER_HUB_USERNAME" \
            --arg secret "$DOCKER_HUB_TOKEN" \
            '{identifier: $identifier, secret: $secret}')
          ACCESS_TOKEN=$(curl -fsSL \
            -H "Content-Type: application/json" \
            -d "$AUTH_PAYLOAD" \
            https://hub.docker.com/v2/auth/token |
            jq -er '.access_token')

          TAGS_FILE=$(mktemp)
          trap 'rm -f "$TAGS_FILE"' EXIT
          TAGS_URL="https://hub.docker.com/v2/namespaces/${DOCKER_HUB_USERNAME}/repositories/kolflow/tags?page_size=100"

          while [ -n "$TAGS_URL" ]; do
            RESPONSE=$(curl -fsSL \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              "$TAGS_URL")
            echo "$RESPONSE" | jq -r '.results[].name' >> "$TAGS_FILE"
            TAGS_URL=$(echo "$RESPONSE" | jq -r '.next // empty')
          done

          while read -r TAG; do
            [ -z "$TAG" ] && continue
            SHOULD_KEEP=false
            for KEEP_TAG in $KEEP_TAGS; do
              if [ "$TAG" = "$KEEP_TAG" ]; then
                SHOULD_KEEP=true
                break
              fi
            done

            if [ "$SHOULD_KEEP" = true ]; then
              echo "Keeping Docker Hub tag: $TAG"
            else
              echo "Deleting old Docker Hub tag: $TAG"
              curl -fsS -X DELETE \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                "https://hub.docker.com/v2/namespaces/${DOCKER_HUB_USERNAME}/repositories/kolflow/tags/${TAG}"
            fi
          done < "$TAGS_FILE"
