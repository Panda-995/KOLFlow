name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/panda-995/kolflow
  DOCKERHUB_IMAGE: panda995/kolflow

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.GHCR_IMAGE }}:amd64
            ${{ env.DOCKERHUB_IMAGE }}:amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.GHCR_IMAGE }}:arm64
            ${{ env.GHCR_IMAGE }}:arm
            ${{ env.DOCKERHUB_IMAGE }}:arm64
            ${{ env.DOCKERHUB_IMAGE }}:arm
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Create and push multi-arch manifest (GHCR)
        run: |
          docker buildx imagetools create \
            -t ${{ env.GHCR_IMAGE }}:latest \
            ${{ env.GHCR_IMAGE }}:amd64 \
            ${{ env.GHCR_IMAGE }}:arm64

      - name: Create and push multi-arch manifest (Docker Hub)
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKERHUB_IMAGE }}:latest \
            ${{ env.DOCKERHUB_IMAGE }}:amd64 \
            ${{ env.DOCKERHUB_IMAGE }}:arm64

      - name: Verify published images (GHCR)
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:latest

      - name: Verify published images (Docker Hub)
        run: |
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:latest

  cleanup:
    needs: [merge-manifest]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGE_NAME="kolflow"

          KEEP_TAGS="latest amd64 arm arm64"
          API_BASE="/users/${OWNER}/packages/container/${PACKAGE_NAME}"

          PACKAGE_VERSIONS=$(gh api -H "Accept: application/vnd.github+json" \
            "${API_BASE}/versions" \
            --paginate --jq '.[] | {id: .id, tags: [.metadata.container.tags[]]}')

          echo "$PACKAGE_VERSIONS" | jq -c '.' | while read -r version; do
            ID=$(echo "$version" | jq -r '.id')
            TAGS=$(echo "$version" | jq -r '.tags[]')

            SHOULD_KEEP=false
            for keep_tag in $KEEP_TAGS; do
              if echo "$TAGS" | grep -q "^${keep_tag}$"; then
                SHOULD_KEEP=true
                break
              fi
            done

            if [ "$SHOULD_KEEP" = false ]; then
              echo "Deleting untagged version: $ID"
              gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "${API_BASE}/versions/${ID}" || true
            fi
          done
